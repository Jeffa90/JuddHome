<div id="juddhome-root">
    <nav id="jh-tabs" class="jh-tabs">
        <button type="button" class="jh-tab jh-tab-active" data-tab="home">Home</button>
        <button type="button" class="jh-tab" data-tab="collections">Collections</button>
        <button type="button" class="jh-tab" data-tab="genres">Genres</button>
        <button type="button" class="jh-tab" data-tab="decades">Decades</button>
    </nav>
    <div id="jh-hero" class="jh-hero" hidden>
        <div class="jh-hero-slides"></div>
        <button type="button" class="jh-hero-arrow jh-hero-prev" aria-label="Previous">&#10094;</button>
        <button type="button" class="jh-hero-arrow jh-hero-next" aria-label="Next">&#10095;</button>
        <div class="jh-hero-dots"></div>
    </div>
    <div class="jh-toolbar">
        <button type="button" id="jh-settings-btn" class="jh-settings-btn" title="JuddHome Settings">&#9881; Customise home</button>
    </div>
    <div id="jh-sections"></div>

    <div id="jh-settings-modal" class="jh-modal" hidden>
        <div class="jh-modal-backdrop"></div>
        <div class="jh-modal-panel">
            <h2>JuddHome Settings</h2>
            <p class="jh-modal-hint">Tick sections to show them. Drag (or use the arrows) to reorder.</p>
            <ul id="jh-settings-list" class="jh-settings-list"></ul>
            <div class="jh-modal-actions">
                <button type="button" id="jh-settings-cancel" class="jh-btn jh-btn-ghost">Cancel</button>
                <button type="button" id="jh-settings-save" class="jh-btn jh-btn-accent">Save</button>
            </div>
        </div>
    </div>
</div>
